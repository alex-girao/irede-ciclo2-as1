<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aula 02 — Quiz Lógico</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #f0f0f5;
    --surface:  #ffffff;
    --border:   #d8d5e8;
    --accent:   #8d62ff;
    --accent2:  #00c896;
    --text:     #1a1730;
    --muted:    #7a748f;
    --green:    #155e35;
    --green-bg: #d6f5e5;
    --green-border: #6edaa8;
    --red:      #7a1f1f;
    --red-bg:   #fde8e8;
    --red-border:#f0a0a0;
    --true-btn: #ede8ff;
    --false-btn:#e0faf3;
    --radius:   10px;
    --glow:     0 0 18px rgba(141,98,255,0.15);
    --grad:     linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
    background-image:
      radial-gradient(ellipse 70% 40% at 50% -10%, rgba(141,98,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 80% 110%, rgba(0,200,150,0.06) 0%, transparent 70%);
  }

  header {
    text-align: center;
    padding: 36px 20px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: var(--surface);
    box-shadow: 0 2px 16px rgba(141,98,255,0.07);
  }
  .header-logo {
    height: 48px;
    margin-bottom: 14px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, #8d62ff, transparent);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo span { opacity: 0.6; }
  .subtitle {
    color: var(--muted);
    font-size: .9rem;
    margin-top: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 28px auto 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend i {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: #8d62ff;
  }
  .legend i.v { background: #00a87a; }
  .legend i.f { background: #d63030; }

  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin: 0 auto;
    padding: 22px 20px 0;
    max-width: 900px;
  }
  .score-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 18px;
    color: var(--muted);
    box-shadow: 0 1px 6px rgba(141,98,255,0.08);
  }
  .score-pill strong { color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    transition: border-color .25s, box-shadow .25s, background .35s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(141,98,255,0.06);
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .card.correct {
    border-color: var(--green-border);
    background: var(--green-bg);
    box-shadow: 0 0 16px rgba(0,180,100,0.12);
  }
  .card.incorrect {
    border-color: var(--red-border);
    background: var(--red-bg);
    box-shadow: 0 0 16px rgba(220,80,80,0.1);
  }

  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: .1em;
  }

  .expression {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(.9rem, 2vw, 1.05rem);
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 14px;
    word-break: break-word;
  }
  .expression .val-true  { color: #0a8a5c; font-weight: 700; }
  .expression .val-false { color: #d63030; font-weight: 700; }
  .expression .op        { color: #8d62ff; }
  .expression .question  { color: #00a87a; font-size: 1.15em; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .vf-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 7px;
    border: 1.5px solid transparent;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: .95rem;
    cursor: pointer;
    transition: background .18s, border-color .18s, transform .1s, box-shadow .18s;
    letter-spacing: .06em;
  }
  .vf-btn:active { transform: scale(0.96); }

  .vf-btn.v-btn {
    background: var(--true-btn);
    border-color: #c4b4ff;
    color: #5a30cc;
  }
  .vf-btn.v-btn:hover { background: #ddd5ff; border-color: #8d62ff; box-shadow: 0 0 10px rgba(141,98,255,.2); }
  .vf-btn.v-btn.selected { background: #8d62ff; border-color: #7040ee; color: #fff; box-shadow: 0 0 16px rgba(141,98,255,.35); }

  .vf-btn.f-btn {
    background: var(--false-btn);
    border-color: #80dfc0;
    color: #0a7a5a;
  }
  .vf-btn.f-btn:hover { background: #c0f0e0; border-color: #00c896; box-shadow: 0 0 10px rgba(0,200,150,.2); }
  .vf-btn.f-btn.selected { background: #00b888; border-color: #009970; color: #fff; box-shadow: 0 0 16px rgba(0,200,150,.35); }

  .vf-btn:disabled { cursor: default; opacity: .8; }

  .feedback-icon {
    position: absolute;
    top: 16px; right: 18px;
    font-size: 1.3rem;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity .3s, transform .3s;
  }
  .card.correct   .feedback-icon { color: #0a8a5c; opacity: 1; transform: scale(1); }
  .card.incorrect .feedback-icon { color: #d63030; opacity: 1; transform: scale(1); }

  .actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 36px auto 0;
    padding: 0 20px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 14px 40px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    letter-spacing: .04em;
    box-shadow: 0 4px 22px rgba(141,98,255,0.35);
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(141,98,255,0.5); }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 14px 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .92rem;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .result-panel {
    display: none;
    text-align: center;
    max-width: 480px;
    margin: 32px auto 0;
    padding: 30px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    animation: fadeUp .4s ease;
    box-shadow: 0 4px 24px rgba(141,98,255,0.1);
  }
  .result-panel.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    background: linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-msg { color: var(--muted); font-size: .95rem; margin-top: 6px; }
  .result-bar { margin: 18px 0 8px; height: 8px; background: #e0ddf0; border-radius: 99px; overflow: hidden; }
  .result-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
    transition: width .8s cubic-bezier(.4,0,.2,1); width: 0%;
  }

  .progress-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem;
    color: var(--muted);
    text-align: center;
    margin-top: 14px;
    padding: 0 20px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .expression { font-size: .88rem; }
  }
</style>
</head>
<body>

<header>
  <img class="header-logo" src="https://capacitabrasil.irede.org.br/assets/capacitaLogo-Ct3BEyem.png" alt="Capacita Brasil" />
  <div class="logo">→ ↔ ≡ <span>//</span> Aula 02</div>
  <div class="subtitle">Quiz Lógico — Conectivos Compostos — 20 questões</div>
  <div class="legend">
    <span><i class="v"></i> Verdadeiro (V)</span>
    <span><i class="f"></i> Falso (F)</span>
    <span><i></i> → = Implica &nbsp; ↔ = Bicondicional &nbsp; ¬ = NÃO &nbsp; ∧ = E &nbsp; ∨ = OU</span>
  </div>
</header>

<div class="score-bar">
  <div class="score-pill">Respondidas: <strong id="count">0</strong> / 20</div>
</div>

<div class="grid" id="quiz"></div>

<div class="progress-info" id="progressInfo">Responda todas as questões para verificar o resultado.</div>

<div class="actions">
  <button class="btn-primary" id="btnCheck" disabled onclick="checkAnswers()">Verificar Respostas</button>
  <button class="btn-secondary" id="btnReset" onclick="resetQuiz()">Reiniciar</button>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-score" id="resultScore">—</div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="result-bar"><div class="result-fill" id="resultFill"></div></div>
</div>

<script>
const questions = [
  // 1-4 — Implicação
  { expr: 'P=<V>V</V>, Q=<V>V</V> | P <op>→</op> Q = <q>?</q>', answer: 'V', hint: 'V → V' },
  { expr: 'P=<V>V</V>, Q=<F>F</F> | P <op>→</op> Q = <q>?</q>', answer: 'F', hint: 'V → F' },
  { expr: 'P=<F>F</F>, Q=<V>V</V> | P <op>→</op> Q = <q>?</q>', answer: 'V', hint: 'F → V' },
  { expr: 'P=<F>F</F>, Q=<F>F</F> | P <op>→</op> Q = <q>?</q>', answer: 'V', hint: 'F → F' },

  // 5-8 — Bicondicional
  { expr: 'P=<V>V</V>, Q=<V>V</V> | P <op>↔</op> Q = <q>?</q>', answer: 'V', hint: 'V ↔ V' },
  { expr: 'P=<V>V</V>, Q=<F>F</F> | P <op>↔</op> Q = <q>?</q>', answer: 'F', hint: 'V ↔ F' },
  { expr: 'P=<F>F</F>, Q=<V>V</V> | P <op>↔</op> Q = <q>?</q>', answer: 'F', hint: 'F ↔ V' },
  { expr: 'P=<F>F</F>, Q=<F>F</F> | P <op>↔</op> Q = <q>?</q>', answer: 'V', hint: 'F ↔ F' },

  // 9-11 — Tautologia e Contradição
  { expr: 'P=<V>V</V> | P <op>∨</op> <op>¬</op>P = <q>?</q>', answer: 'V', hint: 'Tautologia: V ∨ F' },
  { expr: 'P=<F>F</F> | P <op>∨</op> <op>¬</op>P = <q>?</q>', answer: 'V', hint: 'Tautologia: F ∨ V' },
  { expr: 'P=<V>V</V> | P <op>∧</op> <op>¬</op>P = <q>?</q>', answer: 'F', hint: 'Contradição: V ∧ F' },

  // 12-13 — Equivalência: ¬P ∨ Q (= P → Q)
  { expr: 'P=<V>V</V>, Q=<F>F</F> | <op>¬</op>P <op>∨</op> Q = <q>?</q>', answer: 'F', hint: '¬V ∨ F = F ∨ F' },
  { expr: 'P=<F>F</F>, Q=<V>V</V> | <op>¬</op>P <op>∨</op> Q = <q>?</q>', answer: 'V', hint: '¬F ∨ V = V ∨ V' },

  // 14-15 — Contrapositiva: ¬Q → ¬P
  { expr: 'P=<V>V</V>, Q=<F>F</F> | <op>¬</op>Q <op>→</op> <op>¬</op>P = <q>?</q>', answer: 'F', hint: 'V → F (contrapositiva)' },
  { expr: 'P=<F>F</F>, Q=<V>V</V> | <op>¬</op>Q <op>→</op> <op>¬</op>P = <q>?</q>', answer: 'V', hint: 'F → V (contrapositiva)' },

  // 16-17 — Negação do bicondicional
  { expr: 'P=<V>V</V>, Q=<F>F</F> | <op>¬</op>(P <op>↔</op> Q) = <q>?</q>', answer: 'V', hint: '¬(V ↔ F) = ¬F' },
  { expr: 'P=<F>F</F>, Q=<F>F</F> | <op>¬</op>(P <op>↔</op> Q) = <q>?</q>', answer: 'F', hint: '¬(F ↔ F) = ¬V' },

  // 18 — Bicondicional expandido
  { expr: 'P=<V>V</V>, Q=<F>F</F> | (P <op>→</op> Q) <op>↔</op> (Q <op>→</op> P) = <q>?</q>', answer: 'F', hint: '(V→F) ↔ (F→V)' },

  // 19-20 — Transitividade da implicação
  { expr: 'P=<V>V</V>, Q=<V>V</V>, R=<F>F</F> | (P <op>→</op> Q) <op>∧</op> (Q <op>→</op> R) = <q>?</q>', answer: 'F', hint: '(V→V) ∧ (V→F)' },
  { expr: 'P=<F>F</F>, Q=<V>V</V>, R=<V>V</V> | (P <op>→</op> Q) <op>∧</op> (Q <op>→</op> R) = <q>?</q>', answer: 'V', hint: '(F→V) ∧ (V→V)' },
];

const userAnswers = new Array(questions.length).fill(null);

function formatExpr(raw) {
  return raw
    .replace(/<V>(.*?)<\/V>/g, '<span class="val-true">$1</span>')
    .replace(/<F>(.*?)<\/F>/g, '<span class="val-false">$1</span>')
    .replace(/<op>(.*?)<\/op>/g, '<span class="op">$1</span>')
    .replace(/<q>(.*?)<\/q>/g, '<span class="question">$1</span>');
}

function buildQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-num">QUESTÃO ${String(i + 1).padStart(2, '0')} &nbsp;·&nbsp; ${q.hint}</div>
      <div class="expression">${formatExpr(q.expr)}</div>
      <div class="btn-row">
        <button class="vf-btn v-btn" onclick="select(${i},'V')">V — Verdadeiro</button>
        <button class="vf-btn f-btn" onclick="select(${i},'F')">F — Falso</button>
      </div>
      <div class="feedback-icon" id="icon-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function select(idx, value) {
  const prev = userAnswers[idx];
  userAnswers[idx] = value;
  const card = document.getElementById(`card-${idx}`);
  card.querySelectorAll('.vf-btn').forEach(b => b.classList.remove('selected'));
  card.querySelector(value === 'V' ? '.v-btn' : '.f-btn').classList.add('selected');
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('count').textContent = answered;
  const btnCheck = document.getElementById('btnCheck');
  const info = document.getElementById('progressInfo');
  if (answered === questions.length) {
    btnCheck.disabled = false;
    info.textContent = 'Todas as questões respondidas! Clique em "Verificar Respostas".';
  } else {
    info.textContent = `Responda todas as questões para verificar o resultado. (${questions.length - answered} restantes)`;
  }
  card.classList.remove('correct', 'incorrect');
  document.getElementById(`icon-${idx}`).style.opacity = '0';
}

function checkAnswers() {
  let correct = 0;
  questions.forEach((q, i) => {
    const card = document.getElementById(`card-${i}`);
    const icon = document.getElementById(`icon-${i}`);
    const isCorrect = userAnswers[i] === q.answer;
    card.classList.toggle('correct',   isCorrect);
    card.classList.toggle('incorrect', !isCorrect);
    icon.textContent = isCorrect ? '✓' : '✗';
    icon.style.opacity = '1';
    icon.style.transform = 'scale(1)';
    card.querySelectorAll('.vf-btn').forEach(b => b.disabled = true);
    if (isCorrect) correct++;
  });
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  document.getElementById('resultScore').textContent = `${correct} / 20`;
  const pct = (correct / 20) * 100;
  setTimeout(() => { document.getElementById('resultFill').style.width = pct + '%'; }, 100);
  let msg = '';
  if (correct === 20)      msg = '🎉 Perfeito! Domínio total dos conectivos compostos!';
  else if (correct >= 16)  msg = '🟢 Excelente! Você tem ótima base em lógica proposicional.';
  else if (correct >= 12)  msg = '🟡 Bom resultado! Revise contrapositiva e bicondicional expandido.';
  else if (correct >= 8)   msg = '🟠 Continue estudando — você está no caminho certo.';
  else                     msg = '🔴 Revise as tabelas-verdade de → e ↔ e tente novamente!';
  document.getElementById('resultMsg').textContent = msg;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('btnCheck').disabled = true;
}

function resetQuiz() {
  userAnswers.fill(null);
  document.getElementById('count').textContent = '0';
  document.getElementById('btnCheck').disabled = true;
  document.getElementById('progressInfo').textContent = 'Responda todas as questões para verificar o resultado.';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('resultFill').style.width = '0%';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
