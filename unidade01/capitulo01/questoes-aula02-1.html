<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz Java — Estruturas de Decisão</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #f0f0f5;
    --surface:  #ffffff;
    --border:   #d8d5e8;
    --accent:   #8d62ff;
    --accent2:  #00c896;
    --text:     #1a1730;
    --muted:    #7a748f;
    --green:    #155e35;
    --green-bg: #d6f5e5;
    --green-border: #6edaa8;
    --red:      #7a1f1f;
    --red-bg:   #fde8e8;
    --red-border:#f0a0a0;
    --true-btn: #ede8ff;
    --false-btn:#e0faf3;
    --radius:   10px;
    --grad:     linear-gradient(270deg, #8d62ff 53.6%, #00ffbc 98.32%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
    background-image:
      radial-gradient(ellipse 70% 40% at 50% -10%, rgba(141,98,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 80% 110%, rgba(0,200,150,0.06) 0%, transparent 70%);
  }

  header {
    text-align: center;
    padding: 36px 20px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: var(--surface);
    box-shadow: 0 2px 16px rgba(141,98,255,0.07);
  }
  .header-logo { height: 48px; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; }
  header::after {
    content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 2px; background: linear-gradient(90deg, transparent, #8d62ff, transparent);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700; letter-spacing: -0.5px;
    background: var(--grad); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo span { opacity: 0.6; }
  .subtitle { color: var(--muted); font-size: .9rem; margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase; }

  .legend {
    display: flex; justify-content: center; gap: 28px; margin: 28px auto 0;
    font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--muted); flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #8d62ff; }
  .legend i.v { background: #00a87a; }
  .legend i.f { background: #d63030; }

  .score-bar {
    display: flex; justify-content: center; align-items: center; gap: 24px;
    margin: 0 auto; padding: 22px 20px 0; max-width: 900px;
  }
  .score-pill {
    font-family: 'JetBrains Mono', monospace; font-size: .82rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 99px; padding: 6px 18px;
    color: var(--muted); box-shadow: 0 1px 6px rgba(141,98,255,0.08);
  }
  .score-pill strong { color: var(--text); }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 16px; max-width: 1020px; margin: 24px auto 0; padding: 0 20px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 22px; transition: border-color .25s, box-shadow .25s, background .35s;
    position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(141,98,255,0.06);
  }
  .card.correct { border-color: var(--green-border); background: var(--green-bg); box-shadow: 0 0 16px rgba(0,180,100,0.12); }
  .card.incorrect { border-color: var(--red-border); background: var(--red-bg); box-shadow: 0 0 16px rgba(220,80,80,0.1); }

  .card-num { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted); margin-bottom: 8px; letter-spacing: .1em; }

  .situation-emoji { font-size: 2rem; margin-bottom: 10px; line-height: 1; }
  .situation-box {
    font-size: .95rem; color: var(--text); line-height: 1.6; margin-bottom: 10px;
    padding: 10px 14px; background: #f5f3ff; border-left: 3px solid #8d62ff; border-radius: 6px;
  }
  .context-box {
    font-size: .88rem; color: var(--muted); line-height: 1.55; margin-bottom: 12px;
    padding: 8px 12px; background: #f8f8fa; border-radius: 6px; border: 1px dashed var(--border);
  }
  .question-text {
    font-family: 'JetBrains Mono', monospace; font-size: .88rem; font-weight: 600;
    color: var(--text); margin-bottom: 12px; padding-top: 2px;
  }
  .kw  { color: #8d62ff; font-weight: 700; }
  .val-true  { color: #0a8a5c; font-weight: 700; }
  .val-false { color: #d63030; font-weight: 700; }

  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .vf-btn {
    flex: 1; padding: 10px 0; border-radius: 7px; border: 1.5px solid transparent;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: .95rem;
    cursor: pointer; transition: background .18s, border-color .18s, transform .1s, box-shadow .18s;
    letter-spacing: .06em;
  }
  .vf-btn:active { transform: scale(0.96); }

  .vf-btn.v-btn { background: var(--true-btn); border-color: #c4b4ff; color: #5a30cc; }
  .vf-btn.v-btn:hover { background: #ddd5ff; border-color: #8d62ff; box-shadow: 0 0 10px rgba(141,98,255,.2); }
  .vf-btn.v-btn.selected { background: #8d62ff; border-color: #7040ee; color: #fff; box-shadow: 0 0 16px rgba(141,98,255,.35); }

  .vf-btn.f-btn { background: var(--false-btn); border-color: #80dfc0; color: #0a7a5a; }
  .vf-btn.f-btn:hover { background: #c0f0e0; border-color: #00c896; box-shadow: 0 0 10px rgba(0,200,150,.2); }
  .vf-btn.f-btn.selected { background: #00b888; border-color: #009970; color: #fff; box-shadow: 0 0 16px rgba(0,200,150,.35); }

  .vf-btn:disabled { cursor: default; opacity: .8; }

  .feedback-icon {
    position: absolute; top: 16px; right: 18px; font-size: 1.3rem;
    opacity: 0; transform: scale(0.5); transition: opacity .3s, transform .3s;
  }
  .card.correct   .feedback-icon { color: #0a8a5c; opacity: 1; transform: scale(1); }
  .card.incorrect .feedback-icon { color: #d63030; opacity: 1; transform: scale(1); }

  .actions {
    display: flex; justify-content: center; gap: 14px; margin: 36px auto 0;
    padding: 0 20px; flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--grad); color: #fff; border: none; border-radius: 9px;
    padding: 14px 40px; font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 1rem; cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s;
    letter-spacing: .04em; box-shadow: 0 4px 22px rgba(141,98,255,0.35);
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(141,98,255,0.5); }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent; color: var(--muted); border: 1.5px solid var(--border);
    border-radius: 9px; padding: 14px 32px; font-family: 'JetBrains Mono', monospace;
    font-size: .92rem; cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .result-panel {
    display: none; text-align: center; max-width: 480px; margin: 32px auto 0;
    padding: 30px 36px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; animation: fadeUp .4s ease; box-shadow: 0 4px 24px rgba(141,98,255,0.1);
  }
  .result-panel.show { display: block; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .result-score {
    font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 700;
    background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .result-msg { color: var(--muted); font-size: .95rem; margin-top: 6px; }
  .result-bar { margin: 18px 0 8px; height: 8px; background: #e0ddf0; border-radius: 99px; overflow: hidden; }
  .result-fill { height: 100%; border-radius: 99px; background: var(--grad); transition: width .8s cubic-bezier(.4,0,.2,1); width: 0%; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: .82rem; color: var(--muted);
    text-decoration: none; margin: 18px 0 0 20px; transition: color .2s;
  }
  .back-link:hover { color: var(--accent); }

  .progress-info { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--muted); text-align: center; margin-top: 14px; padding: 0 20px; }

  .explanation {
    display: none; margin-top: 12px; padding: 8px 12px; border-radius: 6px;
    font-size: .82rem; font-family: 'JetBrains Mono', monospace;
    background: #fffbe6; border: 1px solid #ffe58a; color: #7a5c00;
  }
  .card.correct   .explanation { background: #f0fdf4; border-color: #86efac; color: #166534; display: block; }
  .card.incorrect .explanation { background: #fff1f1; border-color: #fca5a5; color: #991b1b; display: block; }

  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <img class="header-logo" src="https://capacitabrasil.irede.org.br/assets/capacitaLogo-Ct3BEyem.png" alt="Capacita Brasil" />
  <div class="logo">&#x2615; <span>//</span> Java</div>
  <div class="subtitle">Aula 02 &mdash; Estruturas de Decisão &nbsp;·&nbsp; 10 questões</div>
  <div class="legend">
    <span><i class="v"></i> Verdadeiro (V)</span>
    <span><i class="f"></i> Falso (F)</span>
    <span><i></i> Analise cada afirmação e decida se é Verdadeira ou Falsa</span>
  </div>
</header>

<a class="back-link" href="index.html">&larr; Voltar para a aula</a>

<div class="score-bar">
  <div class="score-pill">Respondidas: <strong id="count">0</strong> / 10</div>
</div>

<div class="grid" id="quiz"></div>
<div class="progress-info" id="progressInfo">Responda todas as questões para verificar o resultado.</div>

<div class="actions">
  <button class="btn-primary" id="btnCheck" disabled onclick="checkAnswers()">Verificar Respostas</button>
  <button class="btn-secondary" id="btnReset" onclick="resetQuiz()">Reiniciar</button>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-score" id="resultScore">—</div>
  <div class="result-msg"   id="resultMsg"></div>
  <div class="result-bar"><div class="result-fill" id="resultFill"></div></div>
</div>

<script>
const questions = [
  {
    label: 'Bloco else',
    emoji: '&#x2194;',
    situation: 'O bloco <span class="kw">else</span> de uma estrutura <span class="kw">if/else</span> é executado quando a condição do <span class="val-false">if é verdadeira</span>.',
    context: 'Exemplo: <span class="val-true">if (x > 0) { print("positivo"); } else { print("não positivo"); }</span>',
    question: 'Essa afirmação sobre quando o bloco else é executado está correta?',
    answer: 'F',
    explanation: 'FALSO. O bloco else executa quando a condição do if é FALSA, não verdadeira. Se a condição for verdadeira, o bloco do if é executado e o else é ignorado.'
  },
  {
    label: 'else if encadeado',
    emoji: '&#x1F500;',
    situation: 'Em um <span class="kw">if / else if / else</span>, assim que uma condição verdadeira é encontrada, as demais condições são <span class="val-true">ignoradas</span> — mesmo que também sejam verdadeiras.',
    context: 'Java avalia as condições em ordem. A primeira verdadeira executa seu bloco e o fluxo segue após toda a estrutura.',
    question: 'Essa afirmação sobre o comportamento do if/else if/else está correta?',
    answer: 'V',
    explanation: 'VERDADEIRO. O Java para na primeira condição verdadeira. As condições seguintes não são nem avaliadas, mesmo que pudessem ser verdadeiras.'
  },
  {
    label: 'Nota 85',
    emoji: '&#x1F4CB;',
    situation: 'Com <span class="kw">int nota = 85</span>, o código abaixo imprime <span class="val-true">"Conceito B"</span>:<br><span class="val-true">if (nota &gt;= 90) print("A"); else if (nota &gt;= 70) print("B"); else print("C");</span>',
    context: '85 não é >= 90 (false), mas 85 é >= 70 (true). O bloco do segundo else if é executado.',
    question: 'A saída para nota = 85 nesse código é "Conceito B"?',
    answer: 'V',
    explanation: 'VERDADEIRO. 85 >= 90 é falso → pula. 85 >= 70 é verdadeiro → imprime "Conceito B". O else final é ignorado.'
  },
  {
    label: 'switch com String',
    emoji: '&#x1F521;',
    situation: 'Em Java, o <span class="kw">switch/case</span> pode ser usado com variáveis do tipo <span class="val-true">String</span> (além de int, char e outros).',
    context: 'Exemplo: <span class="val-true">String cor = "azul"; switch(cor) { case "azul": ... }</span>',
    question: 'Essa afirmação sobre os tipos aceitos pelo switch em Java está correta?',
    answer: 'V',
    explanation: 'VERDADEIRO. Desde o Java 7, switch/case aceita String. Também funciona com int, char, byte, short e seus wrappers, e enums.'
  },
  {
    label: 'break no switch',
    emoji: '&#x1F6D1;',
    situation: 'A palavra-chave <span class="kw">break</span> dentro de um <span class="kw">case</span> encerra <span class="val-false">todo o programa Java</span>.',
    context: 'O break aparece ao final de cada case: <span class="val-false">case 1: print("Dom"); break;</span>',
    question: 'Essa afirmação sobre o efeito do break dentro de um switch está correta?',
    answer: 'F',
    explanation: 'FALSO. O break dentro de um switch encerra apenas a execução DO SWITCH, não o programa. O código após o switch continua normalmente. Para encerrar o programa usa-se System.exit(0).'
  },
  {
    label: 'Fall-through',
    emoji: '&#x1F4A7;',
    situation: 'Se um <span class="kw">case</span> não tiver <span class="kw">break</span>, a execução "cai" (<span class="val-true">fall-through</span>) para o próximo case, executando seu bloco também.',
    context: '<span class="val-true">case 1: print("um"); case 2: print("dois"); break;</span> — se dia == 1, imprime tanto "um" quanto "dois".',
    question: 'Essa afirmação sobre o comportamento sem break no switch está correta?',
    answer: 'V',
    explanation: 'VERDADEIRO. Sem break, o Java continua executando os cases seguintes (fall-through) até encontrar um break ou o fim do switch. É um comportamento intencional, mas pode causar bugs se esquecido.'
  },
  {
    label: 'Bloco default',
    emoji: '&#x2753;',
    situation: 'O bloco <span class="kw">default</span> de um <span class="kw">switch</span> é executado <span class="val-true">somente quando nenhum case corresponde</span> ao valor avaliado.',
    context: 'É análogo ao bloco else de um if. Com <span class="val-true">int dia = 9</span> e cases apenas para 1 e 2, o default seria executado.',
    question: 'Essa afirmação sobre o bloco default do switch está correta?',
    answer: 'V',
    explanation: 'VERDADEIRO. O default funciona como o "else" do switch: executa quando nenhum outro case corresponde ao valor. Não precisa ser o último, mas por convenção é colocado no final.'
  },
  {
    label: 'if aninhado',
    emoji: '&#x1F5C2;',
    situation: 'Com <span class="kw">int x = 5</span>, o código abaixo imprime <span class="val-false">"A"</span>:<br><span class="val-false">if (x &gt; 3) { if (x &gt; 7) { print("A"); } else { print("B"); } }</span>',
    context: 'x > 3 é true. Dentro do bloco, x > 7 é avaliado. 5 > 7 é false, então o else interno executa.',
    question: 'A saída desse if aninhado para x = 5 é "A"?',
    answer: 'F',
    explanation: 'FALSO. x > 3 é true (entra no bloco externo). x > 7 é false (5 não é maior que 7), então o else interno executa e imprime "B".'
  },
  {
    label: 'else obrigatório',
    emoji: '&#x2753;',
    situation: 'Em Java, é <span class="val-false">obrigatório</span> ter um bloco <span class="kw">else</span> após todo <span class="kw">if</span>.',
    context: 'Exemplo sem else: <span class="val-true">if (x > 0) { print("positivo"); }</span> — esse código é válido.',
    question: 'Essa afirmação sobre a obrigatoriedade do else está correta?',
    answer: 'F',
    explanation: 'FALSO. O bloco else é completamente opcional. Um if sem else é perfeitamente válido: se a condição for falsa, o bloco simplesmente não executa e o programa segue normalmente.'
  },
  {
    label: 'switch vs if/else',
    emoji: '&#x2696;',
    situation: 'O <span class="kw">switch/case</span> é mais adequado que vários <span class="kw">if/else</span> quando há <span class="val-true">muitas comparações de igualdade</span> com valores fixos e discretos.',
    context: 'Por exemplo: verificar o dia da semana (1 a 7), o mês do ano (1 a 12), ou o código de um produto.',
    question: 'Essa afirmação sobre quando preferir switch ao invés de if/else está correta?',
    answer: 'V',
    explanation: 'VERDADEIRO. O switch é ideal para comparações de igualdade com valores fixos (1, 2, 3... ou "opção A", "opção B"). Para intervalos (nota >= 70) ou condições complexas, if/else é mais adequado.'
  }
];

let answered = 0;
let userAnswers = new Array(questions.length).fill(null);

function buildQuiz() {
  const grid = document.getElementById('quiz');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    grid.innerHTML += `
      <div class="card" id="card${i}">
        <div class="feedback-icon" id="icon${i}"></div>
        <div class="card-num">QUESTÃO ${String(i+1).padStart(2,'0')} &nbsp;·&nbsp; ${q.label}</div>
        <div class="situation-emoji">${q.emoji}</div>
        <div class="situation-box">${q.situation}</div>
        <div class="context-box">${q.context}</div>
        <div class="question-text">${q.question}</div>
        <div class="btn-row">
          <button class="vf-btn v-btn" id="v${i}" onclick="select(${i},'V')">V &nbsp; Verdadeiro</button>
          <button class="vf-btn f-btn" id="f${i}" onclick="select(${i},'F')">F &nbsp; Falso</button>
        </div>
        <div class="explanation" id="exp${i}">${q.explanation}</div>
      </div>`;
  });
}

function select(i, val) {
  if (userAnswers[i] !== null) return;
  const wasNull = userAnswers[i] === null;
  userAnswers[i] = val;
  document.getElementById('v'+i).classList.toggle('selected', val==='V');
  document.getElementById('f'+i).classList.toggle('selected', val==='F');
  if (wasNull) {
    answered++;
    document.getElementById('count').textContent = answered;
    if (answered === questions.length) {
      document.getElementById('btnCheck').disabled = false;
      document.getElementById('progressInfo').textContent = 'Todas as questões respondidas! Clique em "Verificar Respostas".';
    }
  }
}

function checkAnswers() {
  let score = 0;
  questions.forEach((q, i) => {
    const card = document.getElementById('card'+i);
    const icon = document.getElementById('icon'+i);
    document.getElementById('v'+i).disabled = true;
    document.getElementById('f'+i).disabled = true;
    if (userAnswers[i] === q.answer) {
      card.classList.add('correct');
      icon.textContent = '✓';
      score++;
    } else {
      card.classList.add('incorrect');
      icon.textContent = '✗';
    }
  });
  document.getElementById('btnCheck').disabled = true;
  showResult(score);
}

function showResult(score) {
  const panel = document.getElementById('resultPanel');
  const msgs = [
    [10,10,'🏆 Perfeito! Você domina estruturas de decisão!'],
    [8,9, '⭐ Excelente! Quase lá — releia os pontos que errou.'],
    [6,7, '👍 Bom trabalho! Continue praticando.'],
    [4,5, '📚 Continue estudando! Revise if/else e switch/case.'],
    [0,3, '💪 Não desanime! Releia o conteúdo com calma.']
  ];
  document.getElementById('resultScore').textContent = score + '/10';
  document.getElementById('resultMsg').textContent   = msgs.find(([a,b])=>score>=a&&score<=b)[2];
  panel.classList.add('show');
  setTimeout(()=>{ document.getElementById('resultFill').style.width=(score/10*100)+'%'; }, 100);
  panel.scrollIntoView({ behavior:'smooth', block:'center' });
}

function resetQuiz() {
  answered = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('count').textContent = '0';
  document.getElementById('btnCheck').disabled = true;
  document.getElementById('progressInfo').textContent = 'Responda todas as questões para verificar o resultado.';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('resultFill').style.width = '0%';
  buildQuiz();
}

buildQuiz();
</script>
</body>
</html>
